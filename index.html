<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI学習クイズ</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f4f7fb;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    .container {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    }

    h1 {
      color: #2563eb;
    }

    .question {
      font-size: 22px;
      font-weight: bold;
      margin: 25px 0;
    }

    .choices button {
      display: block;
      width: 100%;
      margin: 12px 0;
      padding: 14px;
      font-size: 17px;
      border: none;
      border-radius: 10px;
      background: #e5e7eb;
      cursor: pointer;
      transition: 0.2s;
    }

    .choices button:hover {
      background: #bfdbfe;
    }

    .correct {
      background: #22c55e !important;
      color: white;
    }

    .wrong {
      background: #ef4444 !important;
      color: white;
    }

    #nextBtn, #restartBtn {
      margin-top: 20px;
      padding: 12px 25px;
      font-size: 17px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      display: none;
    }

    .score {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
    }

    .ad {
      margin: 25px auto;
      padding: 20px;
      background: #f1f5f9;
      border: 2px dashed #94a3b8;
      border-radius: 12px;
      color: #64748b;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>AI学習クイズ</h1>

    <div class="ad">広告エリア</div>

    <div id="quizBox">
      <div class="score" id="scoreText">スコア：0</div>
      <div class="question" id="question">問題文</div>
      <div class="choices" id="choices"></div>
      <button id="nextBtn">次の問題へ</button>
      <button id="restartBtn">もう一度遊ぶ</button>
    </div>
  </div>

<script>
const quizData = [
  {
    question: "AIとは何の略？",
    choices: ["Artificial Intelligence", "Auto Internet", "Active Information", "Animal Intelligence"],
    answer: "Artificial Intelligence"
  },
  {
    question: "機械学習とは何？",
    choices: ["人間がすべて命令する仕組み", "データからパターンを学ぶ仕組み", "電気を節約する技術", "画像を保存する方法"],
    answer: "データからパターンを学ぶ仕組み"
  },
  {
    question: "ChatGPTのようなAIは主に何を扱う？",
    choices: ["文章", "燃料", "天気だけ", "建築材料"],
    answer: "文章"
  },
  {
    question: "AIに指示を出す文章を何という？",
    choices: ["プロンプト", "パスワード", "ブラウザ", "ファイル"],
    answer: "プロンプト"
  },
  {
    question: "教師あり学習で使うものは？",
    choices: ["正解付きデータ", "電池", "地図だけ", "音楽プレイヤー"],
    answer: "正解付きデータ"
  },
  {
    question: "画像認識AIができることは？",
    choices: ["画像の中身を判断する", "料理を実際に作る", "電車を運転する", "水を作る"],
    answer: "画像の中身を判断する"
  },
  {
    question: "生成AIとは？",
    choices: ["新しい文章や画像などを作るAI", "電卓だけのAI", "保存専用ソフト", "時計"],
    answer: "新しい文章や画像などを作るAI"
  },
  {
    question: "AIの学習に多く必要なものは？",
    choices: ["データ", "砂糖", "紙コップ", "鉛筆だけ"],
    answer: "データ"
  },
  {
    question: "AIが間違った情報を本当のように答えることを何という？",
    choices: ["ハルシネーション", "ログイン", "ダウンロード", "スクロール"],
    answer: "ハルシネーション"
  },
  {
    question: "AIを使うときに大切なことは？",
    choices: ["答えを必ず確認する", "何も確認しない", "個人情報を全部入れる", "常に信じる"],
    answer: "答えを必ず確認する"
  }
];

let currentQuestion = 0;
let score = 0;
let answered = false;

const questionEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const scoreText = document.getElementById("scoreText");

function loadQuestion() {
  answered = false;
  nextBtn.style.display = "none";
  choicesEl.innerHTML = "";

  const quiz = quizData[currentQuestion];
  questionEl.textContent = `Q${currentQuestion + 1}. ${quiz.question}`;

  quiz.choices.forEach(choice => {
    const button = document.createElement("button");
    button.textContent = choice;
    button.onclick = () => checkAnswer(button, choice);
    choicesEl.appendChild(button);
  });

  scoreText.textContent = `スコア：${score}`;
}

function checkAnswer(button, choice) {
  if (answered) return;
  answered = true;

  const correctAnswer = quizData[currentQuestion].answer;
  const buttons = document.querySelectorAll(".choices button");

  buttons.forEach(btn => {
    if (btn.textContent === correctAnswer) {
      btn.classList.add("correct");
    }
  });

  if (choice === correctAnswer) {
    score++;
    button.classList.add("correct");
  } else {
    button.classList.add("wrong");
  }

  scoreText.textContent = `スコア：${score}`;
  nextBtn.style.display = "inline-block";
}

nextBtn.onclick = () => {
  currentQuestion++;

  if (currentQuestion < quizData.length) {
    loadQuestion();
  } else {
    showResult();
  }
};

function showResult() {
  questionEl.textContent = `終了！あなたのスコアは ${quizData.length}問中 ${score}問正解です。`;
  choicesEl.innerHTML = "";

  nextBtn.style.display = "none";
  restartBtn.style.display = "inline-block";
}

restartBtn.onclick = () => {
  currentQuestion = 0;
  score = 0;
  restartBtn.style.display = "none";
  loadQuestion();
};

loadQuestion();
</script>

</body>
</html>
